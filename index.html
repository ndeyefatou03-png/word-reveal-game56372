<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Reveal Game</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --card: #1a1a2e;
    --accent: #e8ff6b;
    --accent2: #6bffda;
    --accent3: #ff6bd6;
    --text: #f0f0ff;
    --muted: #5a5a7a;
    --correct: #6bffda;
    --wrong: #ff6b8a;
    --border: #2a2a4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(232,255,107,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(107,255,218,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 700px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 30px;
    padding-top: 10px;
  }

  .title {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    flex: 1;
    text-align: center;
  }

  .stat-label { color: var(--muted); font-size: 0.68rem; display: block; }
  .stat-value { color: var(--accent); font-size: 1rem; font-weight: 700; }

  .progress-bar {
    background: var(--border);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* CARD */
  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .game-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), transparent);
    opacity: 0.6;
  }

  .hint-label {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .hint-text {
    font-size: 1.05rem;
    color: var(--accent2);
    margin-bottom: 26px;
    line-height: 1.6;
    min-height: 1.6em;
  }

  /* WORD DISPLAY */
  .word-display {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 28px;
    min-height: 72px;
    align-items: center;
  }

  .letter-tile {
    width: 42px;
    height: 54px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }

  .letter-tile.hidden {
    color: transparent;
    background: var(--border);
    border-color: var(--muted);
  }

  .letter-tile.revealed {
    background: var(--surface);
    border-color: var(--accent2);
    color: var(--accent2);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .letter-tile.space {
    width: 20px;
    background: transparent;
    border: none;
  }

  @keyframes popIn {
    0% { transform: scale(0.5) translateY(-10px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* REVEAL BUTTONS */
  .reveal-section {
    margin-bottom: 24px;
  }

  .reveal-label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }

  .reveal-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn-reveal {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    min-width: 90px;
  }

  .btn-reveal:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,107,0.06);
  }

  .btn-reveal:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .btn-reveal.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,107,0.1);
  }

  /* ANSWER INPUT */
  .answer-section {
    display: flex;
    gap: 10px;
  }

  .answer-input {
    flex: 1;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .answer-input:focus { border-color: var(--accent2); }
  .answer-input.correct { border-color: var(--correct); background: rgba(107,255,218,0.06); }
  .answer-input.wrong { border-color: var(--wrong); animation: shake 0.4s; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-6px); }
    40%,80% { transform: translateX(6px); }
  }

  .btn-check {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-check:hover { background: #f5ff8a; transform: translateY(-1px); }
  .btn-check:active { transform: translateY(0); }

  /* FEEDBACK */
  .feedback {
    text-align: center;
    font-size: 0.95rem;
    min-height: 28px;
    margin-top: 14px;
    transition: all 0.3s;
    font-weight: 700;
  }

  .feedback.correct { color: var(--correct); }
  .feedback.wrong { color: var(--wrong); }
  .feedback.info { color: var(--accent); }

  /* ACTION BUTTONS */
  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .btn-action {
    flex: 1;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-action:hover {
    border-color: var(--accent3);
    color: var(--accent3);
  }

  .btn-action.primary {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* RESULT OVERLAY */
  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,18,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    text-align: center;
    padding: 20px;
  }

  .result-overlay.show { display: flex; }

  .result-emoji { font-size: 4rem; }

  .result-title {
    font-family: 'Space Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
  }

  .result-score {
    font-size: 1.1rem;
    color: var(--text);
  }

  .btn-restart {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 14px 36px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
  }

  .btn-restart:hover { background: #f5ff8a; transform: translateY(-2px); }

  .word-counter {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: right;
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }

  /* MODE SWITCH */
  .mode-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
  }

  .mode-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--muted);
    border-radius: 8px;
    padding: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--surface);
    color: var(--accent);
    border: 1px solid var(--border);
  }

  /* PASSWORD SCREEN */
  #password-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 24px;
  }

  #password-screen::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 50% 50%, rgba(232,255,107,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .pw-lock {
    font-size: 3rem;
    animation: floatLock 3s ease-in-out infinite;
  }

  @keyframes floatLock {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .pw-title {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-align: center;
  }

  .pw-subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-align: center;
  }

  .pw-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 340px;
  }

  .pw-input {
    flex: 1;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
    letter-spacing: 0.15em;
  }

  .pw-input:focus { border-color: var(--accent2); }
  .pw-input.wrong-pw {
    border-color: var(--wrong);
    animation: shake 0.4s;
  }

  .pw-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 14px 20px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    width: 100%;
  }

  .pw-btn:hover { background: #f5ff8a; transform: translateY(-1px); }
  .pw-btn:active { transform: translateY(0); }

  .pw-error {
    font-size: 0.85rem;
    color: var(--wrong);
    min-height: 1.2em;
    text-align: center;
    font-weight: 700;
    transition: opacity 0.3s;
  }

  #password-screen.unlock-anim {
    animation: unlockFade 0.6s ease forwards;
  }

  @keyframes unlockFade {
    0% { opacity: 1; transform: scale(1); }
    60% { opacity: 1; transform: scale(1.04); }
    100% { opacity: 0; transform: scale(0.96); pointer-events: none; }
  }
</style>
</head>
<body>
<!-- PASSWORD SCREEN -->
<div id="password-screen">
  <div class="pw-lock">🔒</div>
  <div class="pw-title">WORD REVEAL</div>
  <div class="pw-subtitle">合言葉を入力してください</div>
  <div class="pw-input-wrap">
    <input class="pw-input" id="pw-input" type="text" placeholder="合言葉..." autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="pw-btn" onclick="checkPassword()">開く</button>
  </div>
  <div class="pw-error" id="pw-error"></div>
</div>

<div class="container">
  <header>
    <div class="title">WORD REVEAL</div>
    <div class="subtitle">単語を少しずつ見せながら当てよう</div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">スコア</span>
      <span class="stat-value" id="score">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">正解</span>
      <span class="stat-value" id="correct-count" style="color:var(--correct)">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">残り</span>
      <span class="stat-value" id="remaining">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">ヒント使用</span>
      <span class="stat-value" id="hints-used" style="color:var(--accent3)">0</span>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" id="mode-reveal" onclick="setMode('reveal')">🔍 少しずつ表示</button>
    <button class="mode-btn" id="mode-typing" onclick="setMode('typing')">⌨️ タイピング</button>
    <button class="mode-btn" id="mode-hint" onclick="setMode('hint')">💡 ヒントモード</button>
  </div>

  <div class="game-card" id="game-card">
    <div class="word-counter" id="word-counter">1 / 40</div>
    <div class="hint-label">MEANING / 意味</div>
    <div class="hint-text" id="hint-text">読み込み中...</div>

    <div class="word-display" id="word-display"></div>

    <div class="reveal-section" id="reveal-section">
      <div class="reveal-label">文字を少しずつ表示する</div>
      <div class="reveal-controls">
        <button class="btn-reveal" id="btn-1" onclick="reveal(1)">1文字目</button>
        <button class="btn-reveal" id="btn-2" onclick="reveal(2)">前半</button>
        <button class="btn-reveal" id="btn-3" onclick="reveal(3)">ほぼ全部</button>
        <button class="btn-reveal" id="btn-4" onclick="reveal(4)">全部表示</button>
      </div>
    </div>

    <div class="answer-section">
      <input class="answer-input" id="answer-input" type="text" placeholder="英単語を入力..." autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="btn-check" onclick="checkAnswer()">CHECK</button>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="action-row">
      <button class="btn-action" onclick="skipWord()">SKIP →</button>
      <button class="btn-action" onclick="showAnswer()">答えを見る</button>
      <button class="btn-action primary" onclick="nextWord()">次へ ▶</button>
    </div>
  </div>
</div>

<div class="result-overlay" id="result-overlay">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title">COMPLETE!</div>
  <div class="result-score" id="result-score"></div>
  <button class="btn-restart" onclick="restartGame()">もう一度</button>
</div>

<script>
// --- PASSWORD GATE ---
function checkPassword() {
  const input = document.getElementById('pw-input');
  const val = input.value.trim();
  const errorEl = document.getElementById('pw-error');

  if (val === 'はらうち') {
    const screen = document.getElementById('password-screen');
    screen.classList.add('unlock-anim');
    errorEl.textContent = '✓ 合言葉が正しいです！';
    errorEl.style.color = 'var(--correct)';
    setTimeout(() => {
      screen.style.display = 'none';
    }, 600);
  } else {
    input.classList.add('wrong-pw');
    errorEl.textContent = '✗ 合言葉が違います';
    errorEl.style.color = 'var(--wrong)';
    setTimeout(() => input.classList.remove('wrong-pw'), 450);
    input.value = '';
  }
}

// Enter key for password
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });
});
// --- END PASSWORD GATE ---

const WORDS = [
  { word: "invent", meaning: "発明する・考え出す", example: "Who invented the telephone?" },
  { word: "invented", meaning: "発明した（過去形）", example: "She invented a new device." },
  { word: "How's it going?", meaning: "調子はどう？（挨拶）", example: "Hey! How's it going?" },
  { word: "pretty good", meaning: "まあまあ良い・かなり良い", example: "I'm pretty good, thanks!" },
  { word: "bought", meaning: "買った（buy の過去形）", example: "I bought a new book yesterday." },
  { word: "found", meaning: "見つけた（find の過去形）", example: "She found her keys." },
  { word: "find out", meaning: "〜を知る・調べてわかる", example: "I want to find out the truth." },
  { word: "of course", meaning: "もちろん", example: "Of course I'll help you." },
  { word: "at one time", meaning: "かつて・以前は", example: "At one time, this was a forest." },
  { word: "rise", meaning: "上がる・昇る", example: "The sun will rise at 6 AM." },
  { word: "until", meaning: "〜まで（ずっと）", example: "Wait until I come back." },
  { word: "go down", meaning: "下がる・降りる", example: "The temperature went down at night." },
  { word: "all day", meaning: "一日中", example: "It rained all day." },
  { word: "relax", meaning: "リラックスする・くつろぐ", example: "Let's relax at the beach." },
  { word: "relaxed", meaning: "リラックスした（過去形）", example: "I relaxed all afternoon." },
  { word: "also", meaning: "〜も・また", example: "She also likes music." },
  { word: "beat", meaning: "打ち負かす・（心臓が）打つ", example: "His heart beats fast." },
  { word: "beats", meaning: "打ち負かす・打つ（三単現）", example: "She always beats me at chess." },
  { word: "last", meaning: "続く・最後の", example: "How long will the rain last?" },
  { word: "a lot", meaning: "たくさん", example: "I eat a lot of vegetables." },
  { word: "read", meaning: "読む（原形・過去形 同じ）", example: "I read every night before bed." },
  { word: "took", meaning: "取った・かかった（take の過去形）", example: "It took two hours." },
  { word: "ago", meaning: "〜前（過去）", example: "I met her two years ago." },
  { word: "anywhere", meaning: "どこでも・どこかに", example: "You can sit anywhere." },
  { word: "last night", meaning: "昨夜", example: "I watched a movie last night." },
  { word: "have a good time", meaning: "楽しい時間を過ごす", example: "Did you have a good time?" },
  { word: "Why don't we ~?", meaning: "〜しませんか？（提案）", example: "Why don't we go for a walk?" },
  { word: "listen to ~", meaning: "〜を聞く", example: "I listen to music every morning." },
  { word: "in front of ~", meaning: "〜の前に", example: "She stood in front of the mirror." },
  { word: "important", meaning: "重要な・大切な", example: "Friendship is important." },
  { word: "expensive", meaning: "高価な・値段が高い", example: "This bag is too expensive." },
  { word: "terrible", meaning: "ひどい・恐ろしい", example: "The weather was terrible." },
  { word: "sound", meaning: "〜に聞こえる・音", example: "That sounds interesting." },
  { word: "enough", meaning: "十分な・十分に", example: "I have enough money." },
  { word: "bad", meaning: "悪い・ひどい", example: "This is a bad idea." },
];

let words = [];
let currentIndex = 0;
let score = 0;
let correctCount = 0;
let hintsUsed = 0;
let revealLevel = 0;
let answered = false;
let gameMode = 'reveal';
let skipped = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setMode(mode) {
  gameMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + mode).classList.add('active');
  document.getElementById('reveal-section').style.display = mode === 'reveal' ? 'block' : 'none';
  loadWord();
}

function initGame() {
  words = shuffle(WORDS);
  currentIndex = 0;
  score = 0;
  correctCount = 0;
  hintsUsed = 0;
  skipped = [];
  updateStats();
  loadWord();
}

function loadWord() {
  if (currentIndex >= words.length) {
    showResult();
    return;
  }
  const w = words[currentIndex];
  revealLevel = 0;
  answered = false;

  document.getElementById('hint-text').textContent = w.meaning;
  document.getElementById('word-counter').textContent = `${currentIndex + 1} / ${words.length}`;
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').className = 'answer-input';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  document.querySelectorAll('.btn-reveal').forEach((b, i) => {
    b.disabled = false;
    b.classList.remove('active');
  });

  buildWordDisplay(w.word, 0);
  updateProgress();
}

function buildWordDisplay(wordStr, level) {
  const container = document.getElementById('word-display');
  container.innerHTML = '';
  const chars = wordStr.split('');
  const total = chars.filter(c => c !== ' ').length;

  let revealCount = 0;
  if (level === 1) revealCount = 1;
  else if (level === 2) revealCount = Math.floor(total * 0.4);
  else if (level === 3) revealCount = Math.floor(total * 0.75);
  else if (level === 4) revealCount = total;

  let revealed = 0;
  chars.forEach((ch, i) => {
    const tile = document.createElement('div');
    if (ch === ' ') {
      tile.className = 'letter-tile space';
    } else {
      const shouldReveal = revealed < revealCount;
      tile.className = `letter-tile ${shouldReveal ? 'revealed' : 'hidden'}`;
      tile.textContent = shouldReveal ? ch : '';
      if (shouldReveal) tile.style.animationDelay = `${revealed * 0.06}s`;
      revealed++;
    }
    container.appendChild(tile);
  });
}

function reveal(level) {
  if (level <= revealLevel) return;
  revealLevel = level;
  hintsUsed++;
  document.getElementById('hints-used').textContent = hintsUsed;

  for (let i = 1; i <= level; i++) {
    const btn = document.getElementById(`btn-${i}`);
    btn.classList.add('active');
    btn.disabled = true;
  }

  buildWordDisplay(words[currentIndex].word, level);
}

function checkAnswer() {
  if (answered) { nextWord(); return; }
  const input = document.getElementById('answer-input');
  const userAnswer = input.value.trim().toLowerCase();
  const correct = words[currentIndex].word.toLowerCase();

  if (!userAnswer) return;

  const isCorrect = userAnswer === correct ||
    userAnswer.replace(/[~?]/g,'').trim() === correct.replace(/[~?]/g,'').trim();

  if (isCorrect) {
    const pts = Math.max(10, 40 - revealLevel * 8);
    score += pts;
    correctCount++;
    input.className = 'answer-input correct';
    document.getElementById('feedback').textContent = `✓ 正解！ +${pts}点`;
    document.getElementById('feedback').className = 'feedback correct';
    answered = true;
    document.getElementById('correct-count').textContent = correctCount;
    document.getElementById('score').textContent = score;
    updateProgress();
    setTimeout(nextWord, 1000);
  } else {
    input.className = 'answer-input wrong';
    document.getElementById('feedback').textContent = `✗ もう一度！ (ヒント: ${words[currentIndex].word.charAt(0)}...)`;
    document.getElementById('feedback').className = 'feedback wrong';
    setTimeout(() => input.className = 'answer-input', 600);
  }
}

function showAnswer() {
  buildWordDisplay(words[currentIndex].word, 4);
  document.getElementById('feedback').textContent = `答え: ${words[currentIndex].word} — ${words[currentIndex].example}`;
  document.getElementById('feedback').className = 'feedback info';
  answered = true;
}

function skipWord() {
  skipped.push(currentIndex);
  document.getElementById('feedback').textContent = `スキップ（後で復習）`;
  document.getElementById('feedback').className = 'feedback';
  setTimeout(nextWord, 500);
}

function nextWord() {
  currentIndex++;
  loadWord();
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('remaining').textContent = words.length - currentIndex;
  document.getElementById('hints-used').textContent = hintsUsed;
}

function updateProgress() {
  const pct = (currentIndex / words.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('remaining').textContent = words.length - currentIndex;
}

function showResult() {
  const overlay = document.getElementById('result-overlay');
  overlay.classList.add('show');
  const pct = Math.round((correctCount / words.length) * 100);
  let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '👍' : '📚';
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-score').innerHTML =
    `${correctCount} / ${words.length} 正解 (${pct}%)<br>合計スコア: <b style="color:var(--accent)">${score}</b>点<br>ヒント使用: ${hintsUsed}回`;
}

function restartGame() {
  document.getElementById('result-overlay').classList.remove('show');
  initGame();
}

// Enter key
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('answer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAnswer();
  });
  initGame();
});
</script>
</body>
</html>
